services:
  primary-db:
    image: postgres:17
    container_name: primary-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REPLICATOR_PASS: ${REPLICATOR_PASS}
    volumes:
      - ./postgres/primary/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./postgres/primary/pg_hba.conf:/etc/postgresql/pg_hba.conf
      - ./postgres/primary/init-primary.sh:/docker-entrypoint-initdb.d/init-primary.sh
      - primary_data:/var/lib/postgresql/data
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
  postgres-replica1:
    image: postgres:17
    container_name: postgres-replica-1
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGPASSWORD: ${REPLICATOR_PASS}
    volumes:
      - ./postgres/replica/init-replica.sh:/init-replica.sh
      - replica1_data:/var/lib/postgresql/data
    command: bash /init-replica.sh
    ports:
      - "5434:5432"
    depends_on:
      primary-db:
        condition: service_healthy

  postgres-replica2:
    image: postgres:17
    container_name: postgres-replica-2
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGPASSWORD: ${REPLICATOR_PASS}
    volumes:
      - ./postgres/replica/init-replica.sh:/init-replica.sh
      - replica2_data:/var/lib/postgresql/data
    command: bash /init-replica.sh
    ports:
      - "5435:5432"
    depends_on:
      primary-db:
        condition: service_healthy

  nginx:
    image: nginx:1.29
    container_name: nginx
    ports:
      - "8099:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api-server-1
      - api-server-2
      - api-server-3

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    ports:
      - "3500:3000"
    environment:
        GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
        GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    depends_on:
      - loki

  api-server-1:
    build:
        context: .
        dockerfile: Dockerfile
    container_name: api-server-1
    environment:
      DB_WRITE_URL: ${DB_WRITE_URL}
      DB_READ_1_URL: ${DB_READ_1_URL}
      DB_READ_2_URL: ${DB_READ_2_URL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: ${SERVER_PORT}
    depends_on:
      primary-db:
        condition: service_healthy

  api-server-2:
    build:
        context: .
        dockerfile: Dockerfile
    container_name: api-server-2
    environment:
      DB_WRITE_URL: ${DB_WRITE_URL}
      DB_READ_1_URL: ${DB_READ_1_URL}
      DB_READ_2_URL: ${DB_READ_2_URL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: ${SERVER_PORT}
    depends_on:
      primary-db:
        condition: service_healthy

  api-server-3:
    build:
        context: .
        dockerfile: Dockerfile
    container_name: api-server-3
    environment:
      DB_WRITE_URL: ${DB_WRITE_URL}
      DB_READ_1_URL: ${DB_READ_1_URL}
      DB_READ_2_URL: ${DB_READ_2_URL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: ${SERVER_PORT}
    depends_on:
      primary-db:
        condition: service_healthy

volumes:
  primary_data:
  replica1_data:
  replica2_data: