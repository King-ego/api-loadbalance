services:
  primary-db:
      image: postgres:17
      container_name: primary-db
      environment:
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_DB: ${POSTGRES_DB}
      ports:
      - "5432:25432"
      healthcheck:
        test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
        interval: 10s
        timeout: 5s
        retries: 5
  postgres-replica1:
    image: postgres:17
    container_name: postgres-replica-1
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    depends_on:
      primary-db:
        condition: service_healthy

  postgres-replica2:
    image: postgres:17
    container_name: postgres-replica-2
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    depends_on:
      primary-db:
        condition: service_healthy

  nginx:
    image: nginx:1.29
    container_name: nginx
    ports:
      - "8099:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api-server-1
      - api-server-2
      - api-server-3

  api-server-1:
    build:
        context: .
        dockerfile: Dockerfile
    container_name: api-server-1
    environment:
      DB_WRITE_URL: ${DB_WRITE_URL}
      DB_READ_1_URL: ${DB_READ_1_URL}
      DB_READ_2_URL: ${DB_READ_2_URL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: ${SERVER_PORT}
    depends_on:
      primary-db:
        condition: service_healthy

  api-server-2:
    build:
        context: .
        dockerfile: Dockerfile
    container_name: api-server-2
    environment:
      DB_WRITE_URL: ${DB_WRITE_URL}
      DB_READ_1_URL: ${DB_READ_1_URL}
      DB_READ_2_URL: ${DB_READ_2_URL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: ${SERVER_PORT}
    depends_on:
      primary-db:
        condition: service_healthy

  api-server-3:
    build:
        context: .
        dockerfile: Dockerfile
    container_name: api-server-3
    environment:
      DB_WRITE_URL: ${DB_WRITE_URL}
      DB_READ_1_URL: ${DB_READ_1_URL}
      DB_READ_2_URL: ${DB_READ_2_URL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: ${SERVER_PORT}
    depends_on:
      primary-db:
        condition: service_healthy