services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    healthcheck:
      test: [ "CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping')\" > /dev/null 2>&1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  db:
      image: postgres:17
      environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mydatabase
      ports:
      - "5432:25432"
      healthcheck:
        test: [ "CMD-SHELL", "pg_isready -U postgres" ]
        interval: 10s
        timeout: 5s
        retries: 5
  api-server:
    build:
        context: .
        dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/mydatabase
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/balance
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy