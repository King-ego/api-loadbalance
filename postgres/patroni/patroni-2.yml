scope: pg-cluster
name: pg-node-2

restapi:
  listen: 0.0.0.0:8008
  connect_address: patroni-2:8008

etcd3:
  hosts: etcd:2379

bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576
    postgresql:
      use_pg_rewind: true
      use_slots: true
      parameters:
        wal_level: replica
        max_wal_senders: 10
        wal_keep_size: 64MB
        password_encryption: md5

  initdb:
    - encoding: UTF8
    - data-checksums

  pg_hba:
    - host all all trust
    - host replication replicator 0.0.0.0/0 md5
    - host all all 0.0.0.0/0 md5

  users:
    admin:
      password: ${POSTGRES_PASSWORD}
      options:
        - createrole
        - createdb

postgresql:
  listen: 0.0.0.0:5432
  connect_address: patroni-2:5432
  data_dir: /data/patroni
  pgpass: /tmp/pgpass

  authentication:
    replication:
      username: replicator
      password: ${REPLICATOR_PASS}
    superuser:
      username: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
    rewind:
      username: rewind_user
      password: ${POSTGRES_PASSWORD}

tags:
  nofailover: false
  noloadbalance: false
  clonefrom: false
  nosync: false